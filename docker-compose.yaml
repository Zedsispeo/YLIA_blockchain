services:

  node_a:
    build: .
    environment:
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - ./data/node_a:/app/data

  node_b:
    build: .
    environment:
      - PORT=5001
    ports:
      - "5001:5001"
    volumes:
      - ./data/node_b:/app/data

  node_c:
    build: .
    environment:
      - PORT=5002
      - NODE_KEY=${NODE_C_KEY}
    ports:
      - "5002:5002"
    volumes:
      - ./data/node_c:/app/data

